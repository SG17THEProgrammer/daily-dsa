name: Daily DSA Problem

on:
  schedule:
    - cron: '0 3 * * *'

  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Run Generator
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          python scripts/generate_problem.py

      - name: Commit Changes
        run: |
          git config user.name "SG17THEProgrammer"
          git config user.email "99255020+SG17THEProgrammer@users.noreply.github.com"

          git add .

          git commit -m "Daily DSA problem" || echo "No changes"

          git pull --rebase origin main

          git push origin main
